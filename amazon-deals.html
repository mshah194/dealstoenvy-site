<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealsToEnvy | Amazon Deals</title>
  <meta name="description" content="Amazon deals page for DealsToEnvy powered by your Google Sheet feed." />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="container nav">
      <a href="index.html" class="logo">Deals<span>ToEnvy</span></a>

      <form class="header-search" action="search.html" method="get" autocomplete="off">
        <div class="header-search-wrap">
          <input
            type="text"
            name="q"
            id="header-search-input"
            placeholder="Search deals..."
            class="header-search-input"
          />
          <button class="header-search-button" type="submit" aria-label="Search">🔍</button>
          <div id="header-search-suggestions" class="header-search-suggestions"></div>
        </div>
      </form>

      <nav class="nav-links">
        <a href="index.html">Home</a>
        <a class="active" href="amazon-deals.html">Amazon Deals</a>
        <a href="walmart-deals.html">Walmart Deals</a>
        <a href="affiliate-disclosure.html">Disclosure</a>
        <a href="privacy-policy.html">Privacy</a>
        <a href="terms-and-conditions.html">Terms</a>      
      </nav>
    </div>
  </header>
  <main>
    <section class="page-hero">
      <div class="container page-shell">
        <span class="eyebrow">Amazon Deals</span>
        <div class="filter-bar">
          <input id="amazon-search" class="search-input" type="search" placeholder="Search Amazon deals by keyword..." />
          <a class="btn btn-secondary" href="affiliate-disclosure.html">View disclosure</a>
        </div>
        <div class="small">Last updated: <span data-last-updated></span></div>
      </div>
    </section>
    <section class="section">
      <div class="container">
        <div id="amazon-deals-grid" class="cards"></div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container footer-grid">
      <div><h3>DealsToEnvy</h3><p>Use this as your main Amazon retailer page.</p></div>
      <div class="footer-links"><a href="index.html">Home</a><a href="walmart-deals.html">Walmart Deals</a><a href="privacy-policy.html">Privacy</a></div>
    </div>
  </footer>
  <script src="assets/js/sheet-config.js"></script>
  <script src="assets/js/deals.js"></script>
  <script src="assets/js/site.js"></script>
</body>
</html>
